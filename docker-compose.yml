services:

  # ── AI web UI ─────────────────────────────────────────────
  ai-web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=prod
      - VECTOR_BACKEND=chroma
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/raw:/app/data/raw
      - ./data/logs:/app/data/logs
      - hf-cache:/root/.cache/huggingface
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Telegram bot ──────────────────────────────────────────
  bot:
    build: .
    restart: unless-stopped
    command: ["python", "main.py", "bot"]
    env_file: .env
    volumes:
      - ./data/sqlite:/app/data/sqlite
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/raw:/app/data/raw
      - ./data/logs:/app/data/logs
      - hf-cache:/root/.cache/huggingface
    networks:
      - internal
    depends_on:
      ai-web:
        condition: service_healthy

  # ── SQLite Web (DB browser) ───────────────────────────────
  # Read-only browser for app.db. Start with: docker compose --profile tools up -d sqlite-web
  # Access at: http://<server-local-ip>:8080
  sqlite-web:
    image: coleifer/sqlite-web
    restart: unless-stopped
    command: ["-H", "0.0.0.0", "-p", "8080", "-x", "/data/app.db"]
    volumes:
      - ./data/sqlite:/data:ro
    ports:
      - "8080:8080"
    networks:
      - internal
    profiles:
      - tools

  # ── Cloudflare Tunnel ─────────────────────────────────────
  # Quick tunnel (random *.trycloudflare.com URL, no domain/token needed):
  #   docker compose --profile tunnel up -d cloudflared
  #   docker compose logs cloudflared   ← URL appears here
  #
  # Named tunnel (persistent domain, requires CLOUDFLARE_TUNNEL_TOKEN in .env):
  #   Change command below to: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://ai-web:8000
    networks:
      - internal
    depends_on:
      ai-web:
        condition: service_healthy
    profiles:
      - tunnel

networks:
  internal:
    driver: bridge

volumes:
  hf-cache:      # HuggingFace model cache — persists across container rebuilds
