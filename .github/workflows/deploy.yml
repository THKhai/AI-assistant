name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false   # preserve .env and data/ (gitignored, must stay between runs)

      - name: Verify .env exists
        run: |
          if [ ! -f .env ]; then
            echo "ERROR: .env not found in workspace."
            echo "Place it at: $(pwd)/.env"
            echo "Copy from: .env.example and fill in secrets."
            exit 1
          fi

      - name: Rebuild and restart containers
        run: |
          PROFILES=""
          if grep -qE '^CLOUDFLARE_TUNNEL_TOKEN=.+' .env 2>/dev/null; then
            PROFILES="--profile tunnel"
          fi
          docker compose $PROFILES up -d --build --remove-orphans

      - name: Health check
        run: |
          echo "Waiting for ai-web to become healthy..."
          for i in $(seq 1 24); do
            health=$(docker inspect --format='{{.State.Health.Status}}' \
              "$(docker compose ps -q ai-web)" 2>/dev/null || echo "unknown")
            echo "[${i}] status: $health"
            if [ "$health" = "healthy" ]; then
              echo "Service is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 120s — last 50 log lines:"
          docker compose logs --tail=50
          exit 1
